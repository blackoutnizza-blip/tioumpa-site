<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tioumpa.org</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #071421;
  color: #e6edf3;
  overflow: hidden;
}

.header {
  height: 64px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 18px;
  border-bottom: 1px solid #1f3a52;
  background: rgba(7,20,33,.95);
  cursor: pointer;
}

.header img {
  width: 46px;
  height: 46px;
  object-fit: contain;
}

.header strong {
  font-size: 21px;
}

.app {
  display: flex;
  height: calc(100vh - 64px);
}

.sidebar {
  width: 360px;
  min-width: 360px;
  padding: 18px;
  overflow-y: auto;
  border-right: 1px solid #1f3a52;
  background: rgba(8,24,38,.75);
}

.content {
  flex: 1;
  padding: 36px;
  overflow-y: auto;
  overflow-x: hidden;
}

.letter {
  margin-top: 22px;
  padding-bottom: 6px;
  font-size: 18px;
  font-weight: 600;
  border-bottom: 1px solid #2a445c;
}

.word {
  padding: 11px 12px;
  border-radius: 10px;
  cursor: pointer;
  line-height: 1.35;
}

.word:hover {
  background: rgba(255,255,255,.08);
}

.home {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  animation: fadeIn .45s ease;
}

.home-logo {
  width: 180px;
  height: 180px;
  object-fit: contain;
  animation: logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-12px) rotate(2deg); }
}

.home h1 {
  margin: 18px 0 4px;
  font-size: 42px;
}

.subtitle {
  font-size: 14px;
  letter-spacing: .08em;
  color: #9fb3c8;
}

.email {
  margin-top: 8px;
  max-width: 720px;
  font-size: 12px;
  color: #7890a8;
}

.search-wrapper {
  position: relative;
  margin-top: 28px;
  width: min(620px, 92%);
}

.search-wrapper input {
  width: 100%;
  padding: 15px 48px;
  border: 1px solid #28445f;
  border-radius: 18px;
  background: rgba(18,38,58,.85);
  color: white;
  font-family: Helvetica, Arial, sans-serif;
  font-size: 16px;
  outline: none;
  transition: transform .25s ease, box-shadow .25s ease, border .25s ease;
}

.search-wrapper input:focus {
  transform: scale(1.035);
  border-color: #6aa3ff;
  box-shadow: 0 0 30px rgba(88,166,255,.22);
}

.search-icon {
  position: absolute;
  left: 17px;
  top: 50%;
  transform: translateY(-50%);
  width: 17px;
  height: 17px;
  filter: invert(1);
  opacity: .85;
}

.mic {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 18px;
}

.home-toggle-section {
  margin-top: 20px;
}

.home-toggle-section button {
  padding: 10px 16px;
  border: 1px solid #28445f;
  border-radius: 12px;
  background: rgba(18,38,58,.85);
  color: white;
  cursor: pointer;
  font-family: Inter, sans-serif;
}

.home-toggle-section button:hover {
  background: rgba(40,68,95,.9);
}

.hidden-box {
  display: none;
  margin-top: 12px;
}

.hidden-box.open {
  display: block;
}

.home-list-item {
  cursor: pointer;
  padding: 6px;
}

.home-list-item:hover {
  color: #78a6ff;
}

.random-title {
  margin-top: 34px;
  font-size: 12px;
  letter-spacing: .12em;
  color: #8aa4bf;
}

.bubbles {
  margin-top: 18px;
  width: min(720px, 95%);
  min-height: 120px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  align-items: center;
}

.bubbles.fade-in {
  animation: bubbleFade .8s ease;
}

@keyframes bubbleFade {
  from { opacity: 0; }
  to { opacity: 1; }
}

.bubble {
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,.09);
  border: 1px solid rgba(255,255,255,.15);
  backdrop-filter: blur(14px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 10px 25px rgba(0,0,0,.22);
  cursor: pointer;
}

.entry {
  animation: entryIn .45s ease;
  max-width: 980px;
}

@keyframes entryIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.entry-title {
  font-size: 34px;
  font-style: italic;
  font-weight: 400;
  margin-bottom: 12px;
}

.entry-divider {
  height: 1px;
  background: #2a445c;
  margin-bottom: 26px;
}

.entry-body {
  white-space: pre-wrap;
  line-height: 2;
  font-size: 17px;
}

.entry-body iframe {
  display: block;
  margin-top: 34px;
  max-width: 760px;
  width: 100%;
  aspect-ratio: 16/9;
  height: auto;
  border-radius: 14px;
}

.entry-image {
  float: right;
  width: min(280px, 42%);
  margin: 0 0 20px 24px;
  border-radius: 16px;
}

.star {
  cursor: pointer;
  font-size: 25px;
  margin-left: 12px;
  vertical-align: middle;
}

.back-btn {
  position: sticky;
  top: 0;
  float: right;
  padding: 9px 14px;
  border: 1px solid #28445f;
  border-radius: 12px;
  background: rgba(18,38,58,.95);
  color: white;
  cursor: pointer;
  z-index: 10;
}

.back-btn:hover {
  background: rgba(40,68,95,.95);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 850px) {
  body { overflow: auto; }

  .app {
    flex-direction: column;
    height: auto;
  }

  .sidebar {
    width: 100%;
    min-width: 0;
    max-height: 300px;
    border-right: none;
    border-bottom: 1px solid #1f3a52;
  }

  .content {
    padding: 24px 18px;
  }

  .home-logo {
    width: 130px;
    height: 130px;
  }

  .home h1 {
    font-size: 32px;
  }

  .entry-title {
    font-size: 27px;
  }

  .entry-image {
    float: none;
    width: 100%;
    margin: 18px 0;
  }
}
</style>
</head>

<body>

<div class="header" onclick="goHome()">
  <img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
  <strong>tioumpa.org</strong>
</div>

<div class="app">
  <aside class="sidebar">
    <div id="list"></div>
  </aside>

  <main class="content" id="content"></main>
</div>

<script>
let entries = [];
let clicks = JSON.parse(localStorage.getItem("clicks") || "{}");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let bubbleTimer = null;

fetch("data.txt")
  .then(r => {
    if (!r.ok) throw new Error("data.txt not found");
    return r.text();
  })
  .then(text => init(text))
  .catch(err => {
    document.getElementById("content").innerHTML = `
      <h2>Δεν φορτώθηκε το data.txt</h2>
      <p>Βεβαιώσου ότι το αρχείο λέγεται ακριβώς <b>data.txt</b> και είναι στον ίδιο φάκελο με το index.html.</p>
    `;
    console.error(err);
  });

function init(text) {
  entries = text
    .split(/\r?\n(?=Ατάκα\s*\d+\s*:|Ατακα\s*\d+\s*:|Ατάκα\d+\s*:|Ατακα\d+\s*:)/g)
    .map(block => {
      const firstLine = block.split(/\r?\n/)[0] || "";
      const title = firstLine
        .replace(/^Ατάκα\s*\d+\s*:\s*/i, "")
        .replace(/^Ατακα\s*\d+\s*:\s*/i, "")
        .trim();
      return { title, full: block };
    })
    .filter(e => e.title);

  renderList();
  route();
  startBubbles();
}

window.addEventListener("hashchange", route);

function normalizeGreekLetter(s) {
  const first = (s || "").trim().charAt(0).toLocaleUpperCase("el-GR");
  return first.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function renderList() {
  const sorted = [...entries].sort((a,b) =>
    a.title.localeCompare(b.title, "el", { sensitivity: "base" })
  );

  const list = document.getElementById("list");
  list.innerHTML = "";

  let current = "";

  sorted.forEach(item => {
    const letter = normalizeGreekLetter(item.title);

    if (letter !== current) {
      current = letter;
      const l = document.createElement("div");
      l.className = "letter";
      l.textContent = letter;
      list.appendChild(l);
    }

    const w = document.createElement("div");
    w.className = "word";
    w.textContent = item.title;
    w.onclick = () => {
      location.hash = encodeURIComponent(item.title);
    };
    list.appendChild(w);
  });
}

function route() {
  const name = decodeURIComponent(location.hash.replace("#", ""));

  if (!name) {
    showHome();
    return;
  }

  const entry = entries.find(e => e.title === name);

  if (!entry) {
    showHome();
    return;
  }

  openEntry(entry);
}

function showHome() {
  document.getElementById("content").innerHTML = `
    <div class="home">
      <img class="home-logo" src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
      <h1>tioumpa.org</h1>
      <div class="subtitle">ΤΟ ΛΕΞΙΚΟ ΤΟΥ TEOSTY</div>
      <div class="email">Αν θέλετε να επικοινωνήσετε μαζί μας για οποιαδήποτε αλλαγή και πρόσθεση στείλτε μας μήνυμα στο: info@tioumpa.org</div>

      <div class="search-wrapper">
        <img class="search-icon" src="https://uxwing.com/wp-content/themes/uxwing/download/user-interface/search-icon.png">
        <input id="searchMain" placeholder="Αναζήτηση...">
        <span class="mic" onclick="voiceSearch(event)">🎤</span>
      </div>

      <div class="home-toggle-section">
        <button onclick="toggleHomeList('trendingBox')">🔥 Εμφάνιση Trending / Popular</button>
        <div id="trendingBox" class="hidden-box">
          ${getTrendingHTML()}
        </div>
      </div>

      <div class="home-toggle-section">
        <button onclick="toggleHomeList('favoritesBox')">⭐ Εμφάνιση Favorites</button>
        <div id="favoritesBox" class="hidden-box">
          ${getFavoritesHTML()}
        </div>
      </div>

      <div class="random-title">ΤΥΧΑΙΕΣ ΛΕΞΕΙΣ</div>
      <div class="bubbles" id="bubbles"></div>
    </div>
  `;

  const input = document.getElementById("searchMain");
  input.addEventListener("input", e => filterSidebar(e.target.value));

  renderBubbles();
}

function getTrendingHTML() {
  const trending = Object.entries(clicks)
    .sort((a,b) => b[1] - a[1])
    .slice(0,5)
    .map(([word]) => `<div class="home-list-item" onclick="location.hash='${encodeURIComponent(word)}'">${word}</div>`)
    .join("");

  return trending || `<div class="home-list-item">Δεν υπάρχουν ακόμα δεδομένα</div>`;
}

function getFavoritesHTML() {
  return favorites
    .map(word => `<div class="home-list-item" onclick="location.hash='${encodeURIComponent(word)}'">${word}</div>`)
    .join("") || `<div class="home-list-item">Δεν έχεις αποθηκεύσει ακόμα αγαπημένα</div>`;
}

function toggleHomeList(id) {
  const box = document.getElementById(id);
  if (box) box.classList.toggle("open");
}

function filterSidebar(q) {
  q = q.toLocaleLowerCase("el-GR");

  document.querySelectorAll(".word").forEach(el => {
    el.style.display = el.textContent.toLocaleLowerCase("el-GR").includes(q) ? "block" : "none";
  });

  document.querySelectorAll(".letter").forEach(letter => {
    let next = letter.nextElementSibling;
    let hasVisible = false;

    while (next && !next.classList.contains("letter")) {
      if (next.classList.contains("word") && next.style.display !== "none") {
        hasVisible = true;
        break;
      }
      next = next.nextElementSibling;
    }

    letter.style.display = hasVisible ? "block" : "none";
  });
}

function renderBubbles() {
  const c = document.getElementById("bubbles");
  if (!c || !entries.length) return;

  c.classList.remove("fade-in");

  setTimeout(() => {
    c.innerHTML = "";

    const shuffled = [...entries].sort(() => Math.random() - 0.5).slice(0, 7);

    shuffled.forEach(item => {
      const isFav = favorites.includes(item.title);

      const b = document.createElement("div");
      b.className = "bubble";
      b.innerHTML = `${isFav ? "⭐ " : ""}${escapeHTML(item.title)}`;
      b.onclick = () => {
        location.hash = encodeURIComponent(item.title);
      };

      c.appendChild(b);
    });

    c.classList.add("fade-in");
  }, 200);
}

function startBubbles() {
  if (bubbleTimer) clearInterval(bubbleTimer);
  bubbleTimer = setInterval(renderBubbles, 6000);
}

function openEntry(entry) {
  clicks[entry.title] = (clicks[entry.title] || 0) + 1;
  localStorage.setItem("clicks", JSON.stringify(clicks));

  const isFav = favorites.includes(entry.title);

  let lines = entry.full.split(/\r?\n/);
  lines.shift();

  let clean = lines.join("\n").replace("Περιγραφή:", "").replace("Περγιφραφή:", "");

  const imageRegex = /(https?:\/\/[^\s"'<>]+\.(?:png|jpg|jpeg|gif|webp))/i;
  const imageMatch = clean.match(imageRegex);
  let imageHTML = "";

  if (imageMatch) {
    imageHTML = `<img class="entry-image" src="${imageMatch[0]}">`;
    clean = clean.replace(imageMatch[0], "");
  }

  document.getElementById("content").innerHTML = `
    <button class="back-btn" onclick="goHome()">← Επιστροφή</button>

    <article class="entry">
      <div class="entry-title">
        ${escapeHTML(entry.title)}
        <span class="star" onclick="toggleFav(event, '${escapeQuotes(entry.title)}')">${isFav ? "⭐" : "☆"}</span>
      </div>
      <div class="entry-divider"></div>
      ${imageHTML}
      <div class="entry-body">${clean}</div>
    </article>
  `;
}

function toggleFav(event, word) {
  event.stopPropagation();

  if (favorites.includes(word)) {
    favorites = favorites.filter(f => f !== word);
  } else {
    favorites.push(word);
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));
  route();
}

function voiceSearch(event) {
  event.stopPropagation();

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Το μικρόφωνο δεν υποστηρίζεται σε αυτόν τον browser.");
    return;
  }

  const r = new SpeechRecognition();
  r.lang = "el-GR";

  r.onresult = e => {
    const text = e.results[0][0].transcript;
    const input = document.getElementById("searchMain");
    if (input) input.value = text;
    filterSidebar(text);
  };

  r.start();
}

function goHome() {
  history.pushState("", document.title, window.location.pathname + window.location.search);
  showHome();
}

function escapeQuotes(str) {
  return str.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

function escapeHTML(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}
</script>

</body>
</html>
