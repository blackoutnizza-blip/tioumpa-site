<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tioumpa.org</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#071421;
color:#e6edf3;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:12px 18px;
border-bottom:1px solid #1f3a52;
cursor:pointer;
}

.header img{width:42px;}

.app{display:flex;height:calc(100vh - 60px);}

.sidebar{
width:380px;
overflow:auto;
border-right:1px solid #1f3a52;
padding:10px;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.word{
padding:8px;
cursor:pointer;
border-radius:8px;
}
.word:hover{background:#1a2f44;}

.letter{
margin-top:15px;
font-weight:bold;
}

.home{
text-align:center;
margin-top:60px;
}

.home-logo{
width:160px;
animation:float 4s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.search{
margin-top:20px;
}

.search input{
padding:12px;
width:60%;
border-radius:10px;
border:none;
}

.bubbles{
margin-top:30px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.bubble{
background:#1a2f44;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

.entry-title{
font-size:30px;
font-style:italic;
}

.entry-body{
margin-top:20px;
line-height:1.6;
}

.back{
margin-bottom:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header" onclick="home()">
<img src="https://i.ibb.co/9m6hW6bn/kranoumpanoumpanoumpa-1.png">
<b>tioumpa.org</b>
</div>

<div class="app">
<div class="sidebar" id="list"></div>
<div class="content" id="content"></div>
</div>

<script>
let entries=[];

fetch("data.txt").then(r=>r.text()).then(t=>{
entries=t.split(/\n(?=Ατάκα)/).map(e=>{
let title=e.split("\n")[0].replace(/Ατάκα\s*\d+:\s*/,"").trim();
return {title,full:e};
});
renderList();
home();
bubbles();
});

function renderList(){
let list=document.getElementById("list");
list.innerHTML="";
let current="";

entries.sort((a,b)=>a.title.localeCompare(b.title,"el"));

entries.forEach(e=>{
let letter=e.title[0].toUpperCase();

if(letter!==current){
current=letter;
let l=document.createElement("div");
l.className="letter";
l.textContent=letter;
list.appendChild(l);
}

let w=document.createElement("div");
w.className="word";
w.textContent=e.title;
w.onclick=()=>open(e);
list.appendChild(w);
});
}

function home(){
document.getElementById("content").innerHTML=`
<div class="home">
<img class="home-logo" src="https://i.ibb.co/9m6hW6bn/kranoumpanoumpanoumpa-1.png">
<h1>tioumpa.org</h1>

<div class="search">
<input id="search" placeholder="Αναζήτηση...">
</div>

<div class="bubbles" id="bubbles"></div>
</div>
`;

document.getElementById("search").oninput=e=>{
let q=e.target.value.toLowerCase();
document.querySelectorAll(".word").forEach(w=>{
w.style.display=w.textContent.toLowerCase().includes(q)?"block":"none";
});
};
}

function bubbles(){
setInterval(()=>{
let box=document.getElementById("bubbles");
if(!box)return;

box.innerHTML="";
entries.sort(()=>Math.random()-0.5).slice(0,6).forEach(e=>{
let b=document.createElement("div");
b.className="bubble";
b.textContent=e.title;
b.onclick=()=>open(e);
box.appendChild(b);
});
},6000);
}

function open(e){
let text=e.full.split("\n").slice(1).join("\n");

document.getElementById("content").innerHTML=`
<div class="back" onclick="home()">← Επιστροφή</div>
<div class="entry-title">${e.title}</div>
<div class="entry-body">${text}</div>
`;
}
</script>

</body>
</html>
